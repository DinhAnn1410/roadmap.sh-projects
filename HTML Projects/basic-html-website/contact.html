<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Contact | Basic HTML Website</title>
        <!-- SEO meta tags -->
        <meta name="description" content="Contact page for a basic HTML website">
        <meta name="author" content="Dinh An Nghiem">
        <meta name="keywords" content="HTML, website, basic, beginner, contact, address">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header>
            <a href="index.html">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d2/Codinglogo.jpg" alt="Website logo" width="36">
                <span>Your name</span>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="articles.html">Articles</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section>
                <h1>Contact me</h1>
                <form action="#" method="post">
                    <fieldset>
                        <legend>Personal info</legend>
                        <div>
                            <label for="name">Your name:</label>
                            <input type="text" id="name" name="name" required placeholder="Enter your name">
                        </div>
                        <div>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>
                        <div>
                            <label for="message">Message:</label>
                            <br>
                            <textarea id="message" name="message" placeholder="Type your message" required></textarea>
                        </div>
                        <button type="submit">Submit</button>
                    </fieldset>
                </form>
            </section>
        </main>
        <footer>
            <p>&copy; all rights reserved 2026</p>
        </footer>
    </body>
</html>
